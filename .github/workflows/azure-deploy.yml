name: Build and Deploy to Azure

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  DOTNET_VERSION: '10.0.x'
  AZURE_WEBAPP_PACKAGE_PATH: './publish'
  SOLUTION_PATH: 'src/Full/Bot/Adoption Bot.sln'
  WORKING_DIRECTORY: 'src/Full/Bot'

jobs:
  build:
    runs-on: ubuntu-latest

    # Azurite gives the integration tests a local Azure Storage emulator so they
    # don't need real cloud credentials. Blob 10000, Queue 10001, Table 10002.
    services:
      azurite:
        image: mcr.microsoft.com/azure-storage/azurite:latest
        ports:
          - 10000:10000
          - 10001:10001
          - 10002:10002

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create .env.local for frontend
        working-directory: ${{ env.WORKING_DIRECTORY }}/Web/web.client
        env:
          VITE_MSAL_CLIENT_ID: ${{ secrets.VITE_MSAL_CLIENT_ID }}
          VITE_MSAL_AUTHORITY: ${{ secrets.VITE_MSAL_AUTHORITY }}
          VITE_MSAL_SCOPES: ${{ secrets.VITE_MSAL_SCOPES }}
          VITE_TEAMSFX_START_LOGIN_PAGE_URL: ${{ secrets.VITE_TEAMSFX_START_LOGIN_PAGE_URL }}
        run: |
          cat > .env.local << EOF
          VITE_MSAL_CLIENT_ID=$VITE_MSAL_CLIENT_ID
          VITE_MSAL_AUTHORITY=$VITE_MSAL_AUTHORITY
          VITE_MSAL_SCOPES=$VITE_MSAL_SCOPES
          VITE_TEAMSFX_START_LOGIN_PAGE_URL=$VITE_TEAMSFX_START_LOGIN_PAGE_URL
          EOF

      - name: Install Node dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}/Web/web.client
        run: npm ci

      - name: Build Node client
        working-directory: ${{ env.WORKING_DIRECTORY }}/Web/web.client
        run: npm run build

      - name: Restore dependencies
        run: dotnet restore "${{ env.SOLUTION_PATH }}"

      - name: Write test appsettings.json (Azurite)
        # The integration tests read appsettings.json via AbstractTest -> TestsConfig (extends
        # AppConfig). AppConfig requires GraphConfig to be present even though the storage-only
        # integration tests never call Graph, so we provide stub Graph values purely to satisfy
        # the PropertyBoundConfig validator. Storage points at the Azurite service container.
        working-directory: ${{ env.WORKING_DIRECTORY }}/UnitTests
        run: |
          cat > appsettings.json << 'EOF'
          {
            "GraphConfig": {
              "ClientId": "00000000-0000-0000-0000-000000000000",
              "ClientSecret": "stub-not-used-in-storage-tests",
              "TenantId": "00000000-0000-0000-0000-000000000000"
            },
            "StorageAuthConfig": {
              "UseRBAC": false,
              "ConnectionString": "UseDevelopmentStorage=true"
            },
            "ConnectionStrings": {
              "Storage": "UseDevelopmentStorage=true"
            }
          }
          EOF

      - name: Build solution
        run: dotnet build "${{ env.SOLUTION_PATH }}" --configuration Release --no-restore

      - name: Run tests (unit + storage integration against Azurite)
        # Integration tests that only need storage now run against the Azurite service
        # container. Tests that need real Microsoft Graph still require additional config
        # and will throw - they remain part of the "full Azure" path documented in
        # docs/DEPLOYMENT-GITHUB-ACTIONS.md.
        run: dotnet test "${{ env.SOLUTION_PATH }}" --configuration Release --no-build --verbosity normal --filter "FullyQualifiedName~UnitTests.Services|FullyQualifiedName~UnitTests.IntegrationTests.StorageManagerIntegrationTests|FullyQualifiedName~UnitTests.IntegrationTests.BatchQueueServiceIntegrationTests|FullyQualifiedName~UnitTests.IntegrationTests.MessageTemplateServiceIntegrationTests" --logger trx --results-directory TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: test-results
          path: TestResults

      - name: Publish Web.Server
        run: dotnet publish "${{ env.WORKING_DIRECTORY }}/Web/Web.Server/Web.Server.csproj" --configuration Release --output ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: webapp-package
          path: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: webapp-package
          path: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        id: deploy-to-azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

      - name: Azure logout
        run: az logout
        if: always()
